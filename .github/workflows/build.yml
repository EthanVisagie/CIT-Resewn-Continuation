name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-1-21-11:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build active version
        run: ./gradlew buildActive --no-daemon --console=plain

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: citresewn-continuation-1.21.11
          path: |
            versions/1.21.11/build/libs/*.jar
            defaults/versions/1.21.11/build/libs/*.jar
