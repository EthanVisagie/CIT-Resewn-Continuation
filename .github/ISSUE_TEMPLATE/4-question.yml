name: Question
description: Ask something or get help using the mod. Use this if nothing else fits.
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Stuck on something? Ask away.
  - type: textarea
    id: the-question
    attributes:
      label: What would you like to know?
      description: The more context you give, the better we can help.
      placeholder: How do I target an item based on its damage value?
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and couldn't find an answer
          required: true