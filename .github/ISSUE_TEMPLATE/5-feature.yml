name: Feature Request
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for something the mod should do? Lay it out below.
  - type: textarea
    id: the-feature
    attributes:
      label: What would you like to see?
      description: Describe the feature or change you're after.
      placeholder: It would be great if the mod could...
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and couldn't find a duplicate
          required: true